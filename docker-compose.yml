services:
  api:
    build: .
    container_name: frictionlog-api
    command: gunicorn api:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000
    volumes:
      - ./frictionlog.db:/app/frictionlog.db
    environment:
      - LLM_API_URL=${LLM_API_URL:-http://host.docker.internal:11434}
      - LLM_MODEL=${LLM_MODEL:-llama3}
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - friction-net

  dashboard:
    build: .
    container_name: frictionlog-ui
    command: streamlit run ui.py --server.port 8501 --server.address 0.0.0.0
    volumes:
      - ./frictionlog.db:/app/frictionlog.db
      - ./ui.py:/app/ui.py:ro
    depends_on:
      - api
    ports:
      - "8501:8501"
    restart: unless-stopped
    networks:
      - friction-net

networks:
  friction-net:
    driver: bridge
