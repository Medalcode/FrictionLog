services:
  api:
    build: .
    container_name: frictionlog-api
    command: gunicorn main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000
    environment:
      - POCKETBASE_URL=${POCKETBASE_URL:-http://host.docker.internal:8090}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - friction-net

  dashboard:
    build: .
    container_name: frictionlog-ui
    command: streamlit run ui.py --server.port 8501 --server.address 0.0.0.0
    volumes:
      - ./ui.py:/app/ui.py:ro
    depends_on:
      - api
    ports:
      - "8501:8501"
    restart: unless-stopped
    networks:
      - friction-net

networks:
  friction-net:
    driver: bridge
